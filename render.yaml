services:
  - type: web
    name: task-productivity-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: DATABASE_URL=postgresql://build:build@localhost:5432/build npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /tasks
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-tracker-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://frontend-six-alpha-81.vercel.app
      - key: NODE_ENV
        value: production

databases:
  # Reuse existing free-tier database in Render workspace.
  # Render allows only one active free Postgres instance.
