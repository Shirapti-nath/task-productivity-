services:
  - type: web
    name: task-productivity-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /tasks
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-productivity-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://frontend-six-alpha-81.vercel.app
      - key: NODE_ENV
        value: production

databases:
  - name: task-productivity-db
    plan: free
    region: oregon
    databaseName: taskproductivity
    user: taskproductivity
